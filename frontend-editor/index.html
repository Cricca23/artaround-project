<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtAround - Editor Curatore</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; padding: 10px 20px; border: none; cursor: pointer; }
        button:hover { background-color: #218838; }
        #message { margin-top: 20px; padding: 10px; display: none; text-align: center; font-weight: bold;}
        
        /* Stile per la lista opere */
        .artwork-list { margin-top: 40px; border-top: 2px solid #ddd; padding-top: 20px; }
        .artwork-card { background: #f9f9f9; border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 5px; }
        .artwork-card h3 { margin: 0 0 10px; color: #333; }
        .artwork-card small { color: #666; font-style: italic; }
    </style>
</head>
<body>

    <h1>🎨 ArtAround: Pannello Inserimento Opere</h1>

    <div id="artwork-form">
        <div class="form-group">
            <label for="name">Titolo dell'Opera:</label>
            <input type="text" id="name" placeholder="Es. La Gioconda" required>
        </div>

        <div class="form-group">
            <label for="author">Autore:</label>
            <input type="text" id="author" placeholder="Es. Leonardo da Vinci" required>
        </div>

        <div class="form-group">
            <label for="license">Licenza (Semantic Web):</label>
            <input type="text" id="license" placeholder="Es. Public Domain">
        </div>

        <div class="form-group">
            <label for="description">Descrizione:</label>
            <textarea id="description" rows="4" placeholder="Descrivi l'opera..."></textarea>
        </div>

        <button onclick="salvaOpera()">💾 Salva Opera nel Database</button>
    </div>

    <div id="message"></div>

    <div class="artwork-list">
        <h2>🖼️ Opere nel Museo</h2>
        
        <div style="margin-bottom: 20px;">
            <input type="text" id="searchBar" placeholder="🔍 Cerca per titolo o autore..." 
                   onkeyup="cercaOpere()" style="padding: 10px; width: 100%; font-size: 16px;">
        </div>

        <div id="lista-opere">
            </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api/items';

        // 1. Funzione per salvare (quella di prima)
        async function salvaOpera() {
            const name = document.getElementById('name').value;
            const author = document.getElementById('author').value;
            const license = document.getElementById('license').value;
            const description = document.getElementById('description').value;

            if (!name || !author) {
                alert("⚠️ Titolo e Autore sono obbligatori!");
                return;
            }

            const nuovaOpera = {
                "@context": "https://schema.org",
                "@type": "VisualArtwork",
                name, author, license, description,
                dateCreated: "Data sconosciuta", 
                provider: "Museo ArtAround"
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(nuovaOpera)
                });

                const data = await response.json();
                const messageDiv = document.getElementById('message');
                messageDiv.style.display = 'block';

                if (response.ok) {
                    messageDiv.style.backgroundColor = '#d4edda';
                    messageDiv.style.color = '#155724';
                    messageDiv.innerHTML = `✅ Opera salvata con successo!`;
                    
                    // Puliamo il modulo
                    document.getElementById('name').value = '';
                    document.getElementById('author').value = '';
                    document.getElementById('license').value = '';
                    document.getElementById('description').value = '';

                    // AGGIORNAMENTO: Ricarichiamo la lista per vedere subito la nuova opera!
                    caricaOpere(); 
                } else {
                    messageDiv.style.backgroundColor = '#f8d7da';
                    messageDiv.style.color = '#721c24';
                    messageDiv.innerHTML = `❌ Errore: ${data.message}`;
                }
            } catch (error) {
                console.error("Errore:", error);
                alert("❌ Errore di connessione col server.");
            }
        }
        
        // Funzione aggiornata: accetta un parametro di ricerca (opzionale)
        async function caricaOpere(filtro = '') {
            const container = document.getElementById('lista-opere');
            
            // Se c'è un filtro, l'URL diventa: .../items?q=Leonardo
            // Se non c'è, resta: .../items
            let url = API_URL;
            if (filtro) {
                url += `?q=${filtro}`;
            }

            try {
                const response = await fetch(url);
                const opere = await response.json();

                container.innerHTML = ''; 

                if (opere.length === 0) {
                    container.innerHTML = '<p>Nessuna opera trovata.</p>';
                    return;
                }

                opere.forEach(opera => {
                    const card = document.createElement('div');
                    card.className = 'artwork-card';
                    card.innerHTML = `
                        <h3>${opera.name}</h3>
                        <p><strong>Autore:</strong> ${opera.author}</p>
                        <p>${opera.description || 'Nessuna descrizione'}</p>
                        <small>Licenza: ${opera.license || 'N/A'}</small>
                    `;
                    container.appendChild(card);
                });

            } catch (error) {
                console.error("Errore nel caricamento:", error);
            }
        }

        // NUOVA: Funzione collegata alla barra di ricerca
        function cercaOpere() {
            const testo = document.getElementById('searchBar').value;
            caricaOpere(testo); // Ricarica la lista passando quello che hai scritto
        }

        // Al caricamento iniziale, chiamiamo la funzione senza filtri
        window.onload = () => caricaOpere();
    </script>

</body>
</html>
