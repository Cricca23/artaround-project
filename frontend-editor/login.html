<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>ArtAround-LogIn</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>
    <!--Contenitore esterno-->
    <div class="vh-100 d-flex justify-content-center align-items-center bg-light">
    <div class="col-11 col-sm-8 col-md-5 col-lg-4"> <!-- Parte per rendere responsive la finsestra di login-->
    <!--Contenitore ineterno per titolo e input ecc-->
    <div class="card shadow w-100" >
        <div class="card-body p-4">
            <h4 class = "card-title text-center mb-4">Login ArtAround 🎨</h4>
            <div class="form-floating mb-3"> <!--Etichetta fluttuante-->
                <input type="email" class="form-control" id="emailInput" placeholder="mario@rossi.it">
                <label for="emailInput">
                    <!--i sta per icons, bi sta per bootstrap icon, bi-envelope e' il nome dell'icona lettera-->
                    <i class="bi bi-envelope me-2"></i>| Email (es. mario@rossi.it)</label>
            </div>
            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="PasswordInput" placeholder="password">
                <label for="PasswordInput">
                    <i class="bi bi-eye"></i> | Password
                </label>
            </div>
            <div><p class=" fs-6 text-end"><a href="#" class="link-secondary link-offset-2 link-underline-opacity-25 link-underline-opacity-100-hover">Password dimenticata?</a></p></div>
            <div>
                <button type="button" class="btn btn-dark w-100 mt-2 py-2 fw-bold shadow-sm" id="LogInButton">Log In</button>
            </div>
            <div class="text-center mt-4 mb-2">
                <!-- text-secondary fa diventare il testo 'normale' grigio-->
                <span class="text-secondary">Non hai un account?</span> 
                <a href="register.html" class="link-dark fw-semibold link-offset-2 link-underline-opacity-25 link-underline-opacity-100-hover">Registrati qui</a>
            </div>
        </div> 
    </div>
    </div>
    </div>
</body>
<script>
    const btnLogIn = document.getElementById("LogInButton");
    const inputEmail = document.getElementById("emailInput");
    const inputPswrd = document.getElementById("PasswordInput");

    btnLogIn.addEventListener("click", async function () {
        
        // Creo oggetto per comodita' 
        const datiLoginUtente = {
            email: inputEmail.value,
            password: inputPswrd.value
        };

        try {
            // Chiamata fetch per spedire i dati dell'utente al server
            const risposta = await fetch("http://localhost:3000/api/auth/login", {
                method: "POST",

                headers : {
                    "Content-Type": "application/json"
                }, 

                body: JSON.stringify(datiLoginUtente)
            });

            // Controllo se il server ha trovato l'utente
            if(!risposta.ok){
                throw new Error("Password o Email sbagliti!");
                
            }
            // Se il server ha trovato l'utente:
            const DatiRisposta = await risposta.json();
            // Salviamo il token JWT che il server ci ha mandato dopo il login, con la chiave "artaround_token".
            localStorage.setItem("artaround_token", DatiRisposta.token);
            // redirect in base al ruolo
            if(DatiRisposta.user.role === "student") {
                window.location.href = "student.html";
            } else {
                window.location.href = "index.html";
            }
        } catch(errore) {
            alert(errore.message);
        }
    });
    
</script>
</html>
