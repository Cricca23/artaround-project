<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>ArtAround-Register</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>
    <!--Contenitore esterno-->
    <div class="vh-100 d-flex justify-content-center align-items-center bg-light">
        <div class="col-11 col-sm-8 col-md-5 col-lg-4">
            <div class="card shadow w-100">
                <div class="card-body p-4">
                    <h4 class="card-title text-center mb-4">Registrati 🎨</h4> 
                    
                    <div class="row g-2 mb-3">
                        <div class="col-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="NomeInput" placeholder="Nome">
                                <label for="NomeInput">Nome</label>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="form-floating ">
                                <input type="text" class="form-control" id="CognomeInput" placeholder="Cognome">
                                <label for="CognomeInput">Cognome</label>
                            </div>
                        </div>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="NewEmail" placeholder="mario@rossi.it">
                        <label for="NewEmail"><i class="bi bi-envelope me-2"></i>| Email</label>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" id="NewPswe" placeholder="password">
                        <label for="NewPswe"><i class="bi bi-eye me-2"></i>| Password</label>
                    </div>
                    <!-- Riga 4: Ruolo -->
                    <div class="mb-3">
                        <label class="form-label text-muted small">Sei uno studente o un insegnante?</label>
                        <div class="d-flex gap-3">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="ruolo" id="ruoloStudente" value="student" checked>
                                <label class="form-check-label" for="ruoloStudente">Studente</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="ruolo" id="ruoloInsegnante" value="teacher">
                                <label class="form-check-label" for="ruoloInsegnante">Insegnante</label>
                            </div>
                        </div>
                    </div> 

                    <div>
                        <button type="button" class="btn btn-dark w-100 mt-2 py-2 fw-bold shadow-sm" id="RegisterBtn">Registrati</button>
                    </div>
                    <div class="text-center mt-4 mb-2">
                        <span class="text-secondary">Hai già un account?</span>
                        <a href="login.html" class="link-dark fw-semibold link-offset-2 link-underline-opacity-25 link-underline-opacity-100-hover">Accedi</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
<script>
    const btnRegister = document.getElementById("RegisterBtn");
    const NomeInput = document.getElementById("NomeInput");
    const CognomeInput = document.getElementById("CognomeInput");
    const EmailInput = document.getElementById("NewEmail");
    const PswrdInput = document.getElementById("NewPswe");
    const ruoloInput = document.querySelector('input[name="ruolo"]:checked').value;

    btnRegister.addEventListener("click", async function () {
        // Creo un oggeto per inserirci tutti i dati dell'utente che si sta registrando
        const datiRegistrazione = {
            name: NomeInput.value,
            surname: CognomeInput.value,
            email: EmailInput.value,
            password: PswrdInput.value,
            role: ruoloInput
        };

        try {
            // Spediamo i dati dell'utente al server
            const risposta = await fetch("http://localhost:3000/api/auth/register", {
                method: "POST",

                headers : {
                    "Content-Type": "application/json"
                }, 

                body: JSON.stringify(datiRegistrazione)
            });

            if(!risposta.ok){
                throw new Error("Errore durante la registrazione.");
            }else {
                // Altrimenti se la risposta e' ok (quindi utente e' stato corretamente salvato)
                // lo reinidirizziamo alla pagina di login
                window.location.href = "login.html";
            }
        }
        catch(errore){
            alert(errore.message);
        }
    });

</script>
</html>
